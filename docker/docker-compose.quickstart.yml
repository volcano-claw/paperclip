services:
  paperclip:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "${PAPERCLIP_PORT:-3100}:3100"
    environment:
      HOST: "0.0.0.0"
      PAPERCLIP_HOME: "/paperclip"
      PAPERCLIP_LOG_DIR: "${PAPERCLIP_LOG_DIR:-/tmp/paperclip-logs}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      HERMES_HOME: "/paperclip/hermes-home"
      OBSIDIAN_VAULT_PATH: "/data/vault"
    volumes:
      - "${PAPERCLIP_DATA_DIR:-../data/docker-paperclip}:/paperclip"
      - "openclaw_second_brain_vault:/data/vault:ro"
      - "/srv/openclaw/hermes-data:/opt/hermes-seed:ro"

volumes:
  openclaw_second_brain_vault:
    external: true
